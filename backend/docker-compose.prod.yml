services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: pawmind_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: pawmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pawmind"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Only expose to localhost (not internet)
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - pawmind-network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pawmind_api
    restart: always
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-password}@db:5432/pawmind
      DATABASE_URL_SYNC: postgresql://postgres:${DB_PASSWORD:-password}@db:5432/pawmind
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./ml:/app/ml
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pawmind-network
    healthcheck:
      # Avoid depending on curl/wget in slim images; use Python stdlib instead.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Frontend (React + Vite build served by Nginx)
  web:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
      args:
        # Use empty to call same-origin `/api/v1` via Nginx proxy.
        VITE_API_URL: ""
    container_name: pawmind_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - pawmind-network

  # PostgreSQL Admin UI (bind to localhost; access via SSH tunnel)
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pawmind_pgadmin
    restart: always
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pawmind-network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  pawmind-network:
    driver: bridge

